<script type="module">
  const hint = document.getElementById("hint");
  const BUILD = "12"; // bump every time you change main.js

  const mainUrl = `./main.js?v=${encodeURIComponent(BUILD)}`;

  async function nukeServiceWorkersAndCaches() {
    try {
      if ("serviceWorker" in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) await r.unregister();
      }
      if ("caches" in window) {
        const keys = await caches.keys();
        for (const k of keys) await caches.delete(k);
      }
    } catch (e) {
      console.warn("SW/cache cleanup skipped:", e);
    }
  }

  hint.textContent = `Booting… checking ${mainUrl}`;

  try {
    await nukeServiceWorkersAndCaches();

    // 1) Fetch main.js FIRST so we can prove what file is being served
    const res = await fetch(mainUrl, { cache: "no-store" });
    if (!res.ok) throw new Error(`Fetch failed: ${res.status} ${res.statusText}`);

    const text = await res.text();
    const firstLine = (text.split("\n")[0] || "").trim();

    console.log("main.js FIRST LINE:", firstLine);
    hint.textContent = `main.js fetched ✅ first line: ${firstLine.slice(0, 38)}…`;

    // Hard requirement: main.js must start with ES imports
    if (!firstLine.startsWith("import")) {
      throw new Error(
        "Your deployed main.js is NOT the new module file. It doesn't start with 'import'. " +
        "This means GitHub Pages is serving an older/different file or wrong folder."
      );
    }

    // 2) Now import the module normally (keeps import.meta.url correct)
    await import(mainUrl);

  } catch (err) {
    console.error("BOOT FAILED:", err);
    hint.textContent = "Boot failed ❌ (open Console)";

    const box = document.createElement("div");
    box.style.position = "fixed";
    box.style.left = "16px";
    box.style.right = "16px";
    box.style.bottom = "16px";
    box.style.zIndex = "9999";
    box.style.padding = "14px";
    box.style.borderRadius = "16px";
    box.style.background = "rgba(10,12,14,0.94)";
    box.style.border = "1px solid rgba(232,238,242,0.18)";
    box.style.color = "rgba(232,238,242,0.92)";
    box.style.fontFamily = "ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
    box.style.lineHeight = "1.45";
    box.innerHTML = `
      <div style="font-weight:800;letter-spacing:0.03em;margin-bottom:6px;">JavaScript didn’t start 🧯</div>
      <div style="opacity:0.85;font-size:13px;">${String(err?.message || err)}</div>
      <div style="opacity:0.7;font-size:12px;margin-top:8px;">
        This usually means: wrong folder deployed, wrong filename case, or old cached service worker.
      </div>
    `;
    document.body.appendChild(box);
  }
</script>
