<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#070A0C" />
  <title>Orbit Portfolio</title>

  <link rel="stylesheet" href="./styles.css?v=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>🌊</text></svg>">
</head>

<body>
  <canvas id="webgl" aria-label="3D portfolio scene"></canvas>

  <div id="loader" class="loader" aria-live="polite">
    <div class="loader__card">
      <div class="loader__title">Loading orbit…</div>
      <div class="loader__bar"><div id="loaderFill" class="loader__fill"></div></div>
      <div id="loaderPct" class="loader__pct">0%</div>
      <div class="loader__note">Scroll or drag once loaded</div>
    </div>
  </div>

  <div id="hud">
    <div class="brand">
      <div class="brand__name">YOUR NAME</div>
      <div class="brand__tag">Scroll / drag to orbit • Click tiles • ESC closes</div>
    </div>

    <div class="bottomRow">
      <div class="hint" id="hint">Booting…</div>
      <div class="chapters" id="chapters" aria-label="Chapters"></div>
    </div>
  </div>

  <div id="panel" class="panel" aria-hidden="true">
    <div class="panel__topbar">
      <div id="panelTitle" class="panel__title">Title</div>
      <button id="panelClose" class="panel__close" aria-label="Close panel">✕</button>
    </div>
    <div id="panelBody" class="panel__body"></div>
  </div>

  <!-- Bootloader: proves main.js exists + loads as module + clears old SW/caches -->
  <script type="module">
    const hint = document.getElementById("hint");

    // bump this every time you update main.js (forces refresh on Pages)
    const BUILD = "1";

    const mainUrl = `./main.js?v=${encodeURIComponent(BUILD)}`;

    function showBootError(message, err) {
      console.error("BOOT FAILED:", message, err || "");
      if (hint) hint.textContent = `Boot failed ❌ (Console)`;

      const box = document.createElement("div");
      box.style.position = "fixed";
      box.style.left = "16px";
      box.style.right = "16px";
      box.style.bottom = "16px";
      box.style.zIndex = "9999";
      box.style.padding = "14px";
      box.style.borderRadius = "16px";
      box.style.background = "rgba(10,12,14,0.94)";
      box.style.border = "1px solid rgba(232,238,242,0.18)";
      box.style.color = "rgba(232,238,242,0.92)";
      box.style.fontFamily = "ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      box.style.lineHeight = "1.45";
      box.innerHTML = `
        <div style="font-weight:800;letter-spacing:0.03em;margin-bottom:6px;">JavaScript didn’t start 🧯</div>
        <div style="opacity:0.85;font-size:13px;">${message}</div>
        <div style="opacity:0.7;font-size:12px;margin-top:8px;">
          Common causes: wrong publish folder (/docs vs root), filename case mismatch, or missing files.
        </div>
      `;
      document.body.appendChild(box);
    }

    async function nukeSWAndCaches() {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) await r.unregister();
        }
      } catch {}
      try {
        if ("caches" in window) {
          const keys = await caches.keys();
          for (const k of keys) await caches.delete(k);
        }
      } catch {}
    }

    hint.textContent = `Checking ${mainUrl}…`;

    try {
      await nukeSWAndCaches();

      // Fetch first to prove file exists (prevents “resource not cached” confusion)
      const res = await fetch(mainUrl, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`Fetch main.js failed: ${res.status} ${res.statusText}`);
      }

      const text = await res.text();
      const firstLine = (text.split("\n")[0] || "").trim();
      console.log("main.js FIRST LINE:", firstLine);

      if (!firstLine.startsWith("import")) {
        throw new Error(
          "Deployed main.js is not an ES module (first line is not 'import'). " +
          "You are likely publishing the wrong folder or old file."
        );
      }

      hint.textContent = "main.js verified ✅ loading…";
      await import(mainUrl);
      // main.js will take over and update the HUD text
    } catch (e) {
      showBootError(e?.message || String(e), e);
    }
  </script>
</body>
</html>
