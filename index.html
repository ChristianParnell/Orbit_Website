<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orbit Portfolio</title>

  <link rel="stylesheet" href="./styles.css" />

  <!-- Avoid favicon.ico 404 on GitHub Pages -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>🌊</text></svg>">
</head>

<body>
  <canvas id="webgl" aria-label="3D portfolio scene"></canvas>

  <!-- This makes the page scrollable (scroll drives orbit) -->
  <div id="scrollArea" aria-hidden="true"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="brand">
      <div class="brand__name">YOUR NAME</div>
      <div class="brand__tag">Scroll to orbit • Drag to rotate • Click folders</div>
    </div>

    <div class="hint">Scroll to rotate • Drag to orbit • Click folders to open</div>
  </div>

  <!-- Panel -->
  <div id="panel" class="panel" aria-hidden="true">
    <div class="panel__topbar">
      <div id="panelTitle" class="panel__title">Title</div>
      <button id="panelClose" class="panel__close" aria-label="Close panel">✕</button>
    </div>
    <div id="panelBody" class="panel__body"></div>
  </div>

  <!-- IMPORTANT: ES module -->
  <script type="module" src="/Orbit_Website/main.js?v=5"></script>
</body>
</html>
