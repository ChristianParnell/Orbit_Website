<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#AED8EB" />
  <title>Orbit Portfolio</title>
  <link rel="stylesheet" href="./styles.css?v=8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>⌘</text></svg>">
</head>
<body>
  <div id="app">
    <canvas id="webgl" aria-label="3D portfolio scene"></canvas>

    <div class="scanlines" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>
    <div class="glitch-frame" aria-hidden="true"></div>

    <div id="loader" class="loader" aria-live="polite">
      <div class="loader__card">
        <p class="eyebrow">SYSTEM BOOT</p>
        <h2>Loading orbit interface…</h2>
        <div class="loader__bar">
          <div id="loaderFill" class="loader__fill"></div>
        </div>
        <p id="loaderPct" class="loader__pct">0%</p>
        <p class="loader__note">Scroll or drag once loaded</p>
      </div>
    </div>

    <header class="hud">
      <div>
        <p class="eyebrow">ORBIT // DIGITAL PORTFOLIO</p>
        <h1>Christian Parnell</h1>
      </div>

      <div class="hud__right">
        <p>SCROLL / DRAG TO ORBIT</p>
        <p>CLICK A TILE TO OPEN</p>
      </div>
    </header>

    <div id="hoverLabel" class="hover-label" aria-hidden="true"></div>

    <aside id="panel" class="panel" aria-hidden="true">
      <button id="panelClose" class="panel__close" aria-label="Close panel">✕</button>
      <p class="eyebrow">PROJECT ENTRY</p>
      <h2 id="panelTitle">Title</h2>
      <div id="panelBody" class="panel__body">Loading…</div>
    </aside>

    <div class="focus-hint">digital orbit active • hover to inspect • click to open</div>
  </div>

  <script type="module" src="./main.js?v=8"></script>
</body>
</html>
